<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Opening App...</title>
</head>
<body>
    <h3>Opening app...</h3>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            document.body.innerHTML = "Invalid invite link";
        } else {

            const appLink = `gbot://invite?token=${token}`;
            const storeLink = "https://play.google.com/store/apps/details?id=dev.gbot.bubble";

            // Android routing stabil olması için delay
            setTimeout(() => {
                window.location.href = appLink;
            }, 200);

            // fallback
            setTimeout(() => {
                window.location.href = storeLink;
            }, 2000);
        }
    </script>
</body>
</html>
